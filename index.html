<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="🏏 Crickit Arena - Premium Cricket Equipment Showcase. Explore professional-grade cricket kits, protective gear, and accessories. Compare, buy, and find everything for your cricket journey.">
    <meta name="keywords" content="cricket, cricket equipment, bats, pads, gloves, protective gear, cricket shop">
    <meta property="og:title" content="🏏 Crickit Kit Arena - Cricket Equipment Showcase">
    <meta property="og:type" content="website">
    <title>🏏 Crickit Kit Arena - Cricket Equipment & Gear Guide</title>
    <style>
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 10px rgba(0, 102, 204, 0.3); }
            50% { box-shadow: 0 0 20px rgba(0, 102, 204, 0.6); }
        }

        @keyframes cricket-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        :root {
            --bg: #f5f9ff;
            --text: #1a1a1a;
            --border: #d4e4f7;
            --card-bg: #ffffff;
            --accent: #0055cc;
            --accent-hover: #003d99;
            --cricket-green: #1b5e20;
            --cricket-red: #c41c3b;
            --shadow: 0 2px 12px rgba(0, 85, 204, 0.08);
            --shadow-hover: 0 8px 24px rgba(0, 85, 204, 0.15);
        }

        [data-theme="dark"] {
            --bg: #0a0e27;
            --text: #f5f5f5;
            --border: #1a2a4a;
            --card-bg: #0f1a33;
            --accent: #4da6ff;
            --accent-hover: #3d8ee8;
            --shadow: 0 2px 12px rgba(77, 166, 255, 0.1);
            --shadow-hover: 0 8px 24px rgba(77, 166, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 300ms, color 300ms;
            line-height: 1.6;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="%230055cc" stroke-width="2" style="animation: spin 2s linear infinite"/><path d="M12 2 L12 6 M12 18 L12 22 M2 12 L6 12 M18 12 L22 12" stroke="%230055cc" stroke-width="2"/></svg>') 12 12, auto;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 16px;
        }

        header {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: all 300ms;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text);
            font-weight: 800;
            font-size: 24px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), #00d4ff);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            animation: spin-slow 3s linear infinite;
            box-shadow: 0 0 15px rgba(0, 85, 204, 0.3);
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            width: 48px;
            height: 48px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 200ms;
        }

        .theme-toggle:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .controls {
            display: flex;
            gap: 16px;
            margin: 24px 0;
            flex-wrap: wrap;
            align-items: center;
        }

        input[type="search"] {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text);
            font-size: 14px;
            transition: all 200ms;
        }

        input[type="search"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }

        .brand-filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .brand-btn {
            padding: 8px 14px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 200ms;
            white-space: nowrap;
        }

        .brand-btn:hover,
        .brand-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .kits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .kit-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 300ms;
        }

        .kit-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .kit-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, rgba(0, 85, 204, 0.08), rgba(0, 212, 255, 0.08));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            border-bottom: 1px solid var(--border);
            overflow: hidden;
            position: relative;
        }

        .kit-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .kit-card:hover .kit-image img {
            transform: scale(1.08);
        }

        .kit-image.emoji {
            animation: cricket-bounce 2s ease-in-out infinite;
        }

        .kit-content {
            padding: 16px;
        }

        .kit-brand {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .kit-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .kit-meta {
            font-size: 12px;
            color: #888;
            margin-bottom: 12px;
        }

        .kit-price {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 12px;
        }

        .kit-footer {
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 200ms;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .btn.active {
            background: var(--accent);
            color: white;
        }

        .compare-panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin: 40px 0;
        }

        .compare-panel h2 {
            font-size: 18px;
            margin-bottom: 16px;
        }

        .compare-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .compare-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            position: relative;
        }

        .compare-item h4 {
            font-size: 13px;
            margin-bottom: 8px;
        }

        .compare-item p {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }

        .compare-remove {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ff4444;
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 200ms;
        }

        .compare-remove:hover {
            background: #dd0000;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg);
            border-radius: 16px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 200ms;
        }

        .modal-close:hover {
            background: var(--accent);
            color: white;
        }

        .modal-body {
            padding: 24px;
        }

        .modal-image {
            width: 100%;
            height: 280px;
            background: linear-gradient(135deg, rgba(0, 85, 204, 0.08), rgba(0, 212, 255, 0.08));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            margin-bottom: 20px;
            overflow: hidden;
            position: relative;
        }

        .modal-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .modal-image.emoji {
            animation: cricket-bounce 2s ease-in-out infinite;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .modal-meta {
            color: #888;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .modal-price {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 16px;
        }

        .modal-highlights {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .highlight-item {
            font-size: 13px;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
        }

        .highlight-item:last-child {
            border-bottom: none;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
        }

        .modal-actions a,
        .modal-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            transition: all 200ms;
        }

        .modal-actions a:first-child,
        .modal-actions button:first-child {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .modal-actions a:hover,
        .modal-actions button:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        footer {
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            padding: 24px 0;
            margin-top: 60px;
            text-align: center;
            font-size: 12px;
            color: #888;
        }

        @media (max-width: 768px) {
            .kits-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 12px;
            }

            .header-content {
                padding: 12px 0;
            }

            .logo {
                font-size: 18px;
            }

            .controls {
                gap: 8px;
                margin: 16px 0;
            }

            input[type="search"] {
                min-width: 100%;
            }

            .brand-filters {
                width: 100%;
                overflow-x: auto;
                padding-bottom: 8px;
            }
        }

        .empty-message {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }
    </style>
</head>

                    <a id="modalProduct" target="_blank">View Product</a>

    </div>

    <script>
        const KITS = [
            { id: 1, brand: "Gray-Nicolls", name: "Ventus 1.3 Cricket Set with Bat", category: "Batting", price: 5499, level: "Professional", material: "English Willow Grade 1", highlights: ["Power Hitting", "Wide Sweet Spot", "Tournament Ready", "Leather Toe Guard"], image: "https://i.ibb.co/RTjpZyHy/uq94-Im-Ji.jpg", buyUrl: "https://cricketshop.eu/products/gray-nicolls-ventus-1-3-cricket-set-with-bat" },
            { id: 2, brand: "Amazon", name: "Amazon Cricket Batting Gloves Premium", category: "Protective Gear", price: 1899, level: "Intermediate", material: "Premium Leather", highlights: ["Superior Grip", "Padded Protection", "Breathable Design", "Pro Comfort"], image: "https://i.ibb.co/ks6B0YsX/CVV1jsu-Y.jpg", buyUrl: "https://amzn.in/d/07nWH4Z8" },
            { id: 3, brand: "Amazon", name: "Amazon Cricket Safety Helmet Professional", category: "Safety", price: 2999, level: "Professional", material: "ABS Shell", highlights: ["Impact Resistant", "Ventilation Vents", "Snug Fit", "Tournament Approved"], image: "https://i.ibb.co/vvgY7WBs/Dx5zt-NEq.jpg", buyUrl: "https://amzn.in/d/00q0d94l" },
            { id: 4, brand: "Kookaburra", name: "Kahuna 4.1 Complete Cricket Set with Bat", category: "Protective Gear", price: 2499, level: "Advanced", material: "Multi-Layer Steel", highlights: ["Quick Movement", "Light Weight", "Enhanced Padding", "Mobility Focused"], image: "https://i.ibb.co/jdyZftp/h-RYu-Ul7-A.jpg", buyUrl: "https://www.cricketshopitaly.com/products/kookaburra-kahuna-4-1-complete-cricket-set-with-bat" },
            { id: 5, brand: "SportsCrick", name: "English Willow Premium Cricket Kit", category: "Accessories", price: 599, level: "All Levels", material: "Genuine Leather", highlights: ["Perfect Weight", "Red Ball", "Swing Friendly", "Tournament Standard"], image: "https://i.ibb.co/HpdVbTN7/t-Q4-Pewse.jpg", buyUrl: "https://sportscrick.com/product/english-willow-cricket-kit/" },
            { id: 6, brand: "Gray-Nicolls", name: "GN83 Scoop Edition English Willow Full Cricket Kit", category: "Batting", price: 7499, level: "Elite", material: "Premium English Willow", highlights: ["Traditional Design", "Excellent Balance", "Maximum Reach", "Pro Grade"], image: "https://i.ibb.co/Z65shJ9Z/Al-Ao-TTZL.jpg", buyUrl: "https://cricketershop.com/products/gray-nicolls-gn83-scoop-edition-english-willow-full-cricket-kit-size-sh-1" },
            { id: 7, brand: "ArrowMax", name: "Cricket Kit Bag with Gloves & Guard Set", category: "Protective Gear", price: 1299, level: "Starter", material: "Foam Padding", highlights: ["Lightweight", "Comfortable Fit", "Budget Friendly", "Essential Protection"], image: "https://i.ibb.co/rG9ymsQ1/Cc-SA4r-R5.jpg", buyUrl: "https://dl.flipkart.com/dl/arrowmax-cricket-kit-bag-batting-gloves-elbow-guard-thigh-guard-abdominal-3-4-small-size/p/itm23442345bce1a" },
            { id: 8, brand: "ArrowMax", name: "ArrowMax Pro Tournament Cricket Kit Bag", category: "Accessories", price: 3299, level: "Professional", material: "Waterproof Nylon", highlights: ["Spacious Design", "Multiple Pockets", "Durable Material", "Team Logo Ready"], image: "https://i.ibb.co/Y7LRTbw5/b-TIkn-EDV.jpg", buyUrl: "https://dl.flipkart.com/dl/arrowmax-cricket-kit-bag-batting-gloves-elbow-guard-thigh-guard-abdominal-3-4-small-size/p/itm23442345bce1a" },
            { id: 9, brand: "Amazon", name: "Amazon Cricket Shoes Professional Edition", category: "Footwear", price: 3799, level: "Intermediate", material: "Mesh & Rubber", highlights: ["Perfect Grip", "Ankle Support", "Lightweight", "All-Weather"], image: "https://i.ibb.co/PZhrsTzg/z-IHiq6b3.jpg", buyUrl: "https://amzn.in/d/0awIleGj" },
            { id: 10, brand: "Puma", name: "Puma Junior Cricket Set Complete", category: "Protective Gear", price: 999, level: "All Levels", material: "Hard Plastic Shell", highlights: ["Arm Protection", "Easy Adjustment", "Lightweight Design", "Long Lasting"], image: "https://i.ibb.co/rG9ymsQ1/Cc-SA4r-R5.jpg", buyUrl: "https://scssports.in/products/puma-junior-cricket-set" },
            { id: 11, brand: "Gray-Nicolls", name: "GN83 Scoop Edition Cricket Kit Premium", category: "Apparel", price: 2199, level: "Professional", material: "100% Cotton", highlights: ["Breathable Fabric", "Pro Fit", "Easy Care", "Tournament Approved"], image: "https://i.ibb.co/XfjDyFQ2/l-Gklgr-Zb.jpg", buyUrl: "https://www.mirusports.com/gray-nicolls/cricket/gray-nicolls-gn83-scoop-edition-cricket-kit-sh-bat-kit-bag-leg-guard-batting-g/0a463838" },
            { id: 12, brand: "IndiaMART", name: "Outdoor Sports Cricket Kit Professional", category: "Bundle", price: 12999, level: "Starter Package", material: "Mixed Materials", highlights: ["Complete Setup", "Best Value", "All Essentials", "Beginner Friendly"], image: "https://i.ibb.co/Xxfs2jpw/p24-Gj-Jpl.jpg", buyUrl: "https://www.indiamart.com/proddetail/outdoor-sports-cricket-kit-23811360033.html" },
            { id: 13, brand: "SportsCrick", name: "English Willow Pro Cricket Kit Bundle", category: "Bundle", price: 15999, level: "Premium", material: "Professional Grade", highlights: ["Elite Equipment", "Ready to Play", "Tournament Standard", "Best Performance"], image: "https://i.ibb.co/mFRLLL4H/Qmy7e-Da-R.jpg", buyUrl: "https://sportscrick.com/product/english-willow-cricket-kit/" }
        ];

        let theme = localStorage.getItem("theme") || "light";
        let compare = JSON.parse(localStorage.getItem("compare")) || [];
        let search = "";
        let brandFilter = "All";

        const brands = ["All", ...new Set(KITS.map(k => k.brand))];
        const categories = ["All", ...new Set(KITS.map(k => k.category))];

        function init() {
            document.body.setAttribute("data-theme", theme);
            updateThemeBtn();
            renderBrands();
            renderGrid();
            attachEvents();
        }

        function attachEvents() {
            document.getElementById("themeBtn").addEventListener("click", toggleTheme);
            document.getElementById("search").addEventListener("input", e => {
                search = e.target.value.toLowerCase();
                renderGrid();
            });
            document.getElementById("brands").addEventListener("click", e => {
                if (e.target.classList.contains("brand-btn")) {
                    brandFilter = e.target.dataset.brand;
                    renderBrands();
                    renderGrid();
                }
            });
            document.querySelector(".modal-close").addEventListener("click", closeModal);
            document.querySelector(".modal").addEventListener("click", e => {
                if (e.target === e.currentTarget) closeModal();
            });
        }

        function toggleTheme() {
            theme = theme === "light" ? "dark" : "light";
            localStorage.setItem("theme", theme);
            document.body.setAttribute("data-theme", theme);
            updateThemeBtn();
        }

        function updateThemeBtn() {
            document.getElementById("themeBtn").textContent = theme === "light" ? "🌙" : "☀️";
        }

        function renderBrands() {
            const html = brands.map(b => `
                <button class="brand-btn ${b === brandFilter ? "active" : ""}" data-brand="${b}">
                    ${b}
                </button>
            `).join("");
            document.getElementById("brands").innerHTML = html;
        }

        function renderGrid() {
            const filtered = KITS.filter(kit => {
                const brandMatch = brandFilter === "All" || kit.brand === brandFilter;
                const searchMatch = !search || kit.name.toLowerCase().includes(search) || kit.brand.toLowerCase().includes(search) || kit.category.toLowerCase().includes(search);
                return brandMatch && searchMatch;
            });

            if (filtered.length === 0) {
                document.getElementById("grid").innerHTML = '<div class="empty-message">🏏 No kits found. Try a different search or filter.</div>';
                return;
            }

            const html = filtered.map(kit => `
                <div class="kit-card" onclick="showModal(${kit.id})">
                    <div class="kit-image">
                        <img src="${kit.image}" alt="${kit.name}" onerror="this.style.display='none'">
                    </div>
                    <div class="kit-content">
                        <div class="kit-brand">${kit.brand}</div>
                        <div class="kit-name">${kit.name}</div>
                        <div class="kit-meta">${kit.category} • ${kit.level}</div>
                        <div class="kit-price">₹${kit.price.toLocaleString('en-IN')}</div>
                        <div class="kit-footer">
                            <button class="btn" onclick="event.stopPropagation(); toggleCompare(${kit.id})" ${compare.includes(kit.id) ? 'style="background: var(--accent); color: white"' : ''}>
                                ${compare.includes(kit.id) ? "✓ Added" : "Compare"}
                            </button>
                            <button class="btn btn-primary" onclick="event.stopPropagation(); window.open('${kit.buyUrl}', '_blank')">Buy</button>
                        </div>
                    </div>
                </div>
            `).join("");

            document.getElementById("grid").innerHTML = html;
        }

        function toggleCompare(id) {
            if (compare.includes(id)) {
                compare = compare.filter(x => x !== id);
            } else {
                compare.push(id);
            }
            localStorage.setItem("compare", JSON.stringify(compare));
            renderGrid();
            renderCompare();
        }

        function renderCompare() {
            if (compare.length === 0) {
                document.getElementById("comparePanel").style.display = "none";
                return;
            }

            document.getElementById("comparePanel").style.display = "block";

            const items = KITS.filter(k => compare.includes(k.id));
            const html = items.map(kit => `
                <div class="compare-item">
                    <button class="compare-remove" onclick="toggleCompare(${kit.id})">×</button>
                    <h4>${kit.name}</h4>
                    <p><strong>₹${kit.price.toLocaleString('en-IN')}</strong></p>
                    <p>${kit.brand} • ${kit.category}</p>
                    <p>${kit.level} • ${kit.material}</p>
                </div>
            `).join("");

            document.getElementById("compareItems").innerHTML = html;
        }

        function showModal(id) {
            const kit = KITS.find(k => k.id === id);
            const modalImageEl = document.getElementById("modalImage");
            
            // Clear previous content
            modalImageEl.innerHTML = '';
            
            // Create image element
            const img = document.createElement('img');
            img.src = kit.image;
            img.alt = kit.name;
            img.onerror = function() {
                // Fallback to emoji if image fails
                modalImageEl.innerHTML = '🏏';
                modalImageEl.classList.add('emoji');
            };
            img.onload = function() {
                modalImageEl.classList.remove('emoji');
            };
            modalImageEl.appendChild(img);

            document.getElementById("modalTitle").textContent = kit.name;
            document.getElementById("modalMeta").textContent = `${kit.brand} • ${kit.level} • ${kit.category} • ${kit.material}`;
            document.getElementById("modalPrice").textContent = `₹${kit.price.toLocaleString('en-IN')}`;
            document.getElementById("modalHighlights").innerHTML = kit.highlights.map(h => `<div class="highlight-item">✓ ${h}</div>`).join("");
            document.getElementById("modalBuy").href = kit.buyUrl;
            document.getElementById("modalProduct").onclick = function(e) {
                e.preventDefault();
                window.open(kit.buyUrl, '_blank');
            };
            document.getElementById("modalCompare").onclick = () => {
                toggleCompare(id);
                closeModal();
            };
            document.getElementById("modal").classList.add("active");
        }

        function closeModal() {
            document.getElementById("modal").classList.remove("active");
        }

        init();
        renderCompare();
    </script>
</body>
</html>
