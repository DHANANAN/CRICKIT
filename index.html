<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ Crickit Kit Arena - Cricket Equipment Showcase</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --border: #e0e0e0;
            --card-bg: #f8f8f8;
            --accent: #0066cc;
            --accent-hover: #0052a3;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 8px 24px rgba(0, 102, 204, 0.15);
        }

        [data-theme="dark"] {
            --bg: #0d0d0d;
            --text: #f5f5f5;
            --border: #333;
            --card-bg: #1a1a1a;
            --accent: #4da6ff;
            --accent-hover: #3d8ee8;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 8px 24px rgba(77, 166, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 300ms, color 300ms;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 16px;
        }

        header {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: all 300ms;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text);
            font-weight: 800;
            font-size: 24px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), #00d4ff);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            width: 48px;
            height: 48px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 200ms;
        }

        .theme-toggle:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .controls {
            display: flex;
            gap: 16px;
            margin: 24px 0;
            flex-wrap: wrap;
            align-items: center;
        }

        input[type="search"] {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text);
            font-size: 14px;
            transition: all 200ms;
        }

        input[type="search"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }

        .brand-filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .brand-btn {
            padding: 8px 14px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 200ms;
            white-space: nowrap;
        }

        .brand-btn:hover,
        .brand-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .kits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .kit-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 300ms;
        }

        .kit-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .kit-image {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, rgba(0, 102, 204, 0.1), rgba(0, 212, 255, 0.1));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            border-bottom: 1px solid var(--border);
        }

        .kit-content {
            padding: 16px;
        }

        .kit-brand {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .kit-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .kit-meta {
            font-size: 12px;
            color: #888;
            margin-bottom: 12px;
        }

        .kit-price {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 12px;
        }

        .kit-footer {
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 200ms;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .btn.active {
            background: var(--accent);
            color: white;
        }

        .compare-panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin: 40px 0;
        }

        .compare-panel h2 {
            font-size: 18px;
            margin-bottom: 16px;
        }

        .compare-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .compare-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            position: relative;
        }

        .compare-item h4 {
            font-size: 13px;
            margin-bottom: 8px;
        }

        .compare-item p {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }

        .compare-remove {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ff4444;
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 200ms;
        }

        .compare-remove:hover {
            background: #dd0000;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg);
            border-radius: 16px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 200ms;
        }

        .modal-close:hover {
            background: var(--accent);
            color: white;
        }

        .modal-body {
            padding: 24px;
        }

        .modal-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, rgba(0, 102, 204, 0.1), rgba(0, 212, 255, 0.1));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .modal-meta {
            color: #888;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .modal-price {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 16px;
        }

        .modal-highlights {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .highlight-item {
            font-size: 13px;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
        }

        .highlight-item:last-child {
            border-bottom: none;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
        }

        .modal-actions a,
        .modal-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            transition: all 200ms;
        }

        .modal-actions a:first-child,
        .modal-actions button:first-child {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .modal-actions a:hover,
        .modal-actions button:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        footer {
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            padding: 24px 0;
            margin-top: 60px;
            text-align: center;
            font-size: 12px;
            color: #888;
        }

        @media (max-width: 768px) {
            .kits-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 12px;
            }

            .header-content {
                padding: 12px 0;
            }

            .logo {
                font-size: 18px;
            }

            .controls {
                gap: 8px;
                margin: 16px 0;
            }

            input[type="search"] {
                min-width: 100%;
            }

            .brand-filters {
                width: 100%;
                overflow-x: auto;
                padding-bottom: 8px;
            }
        }

        .empty-message {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }
    </style>
</head>
<body data-theme="light">
    <header>
        <div class="container">
            <div class="header-content">
                <a href="#" class="logo">
                    <div class="logo-icon">⚽</div>
                    <span>Crickit Arena</span>
                </a>
                <button class="theme-toggle" id="themeBtn">🌙</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="controls">
            <input type="search" id="search" placeholder="Search cricket kits by name, brand...">
            <div class="brand-filters" id="brands"></div>
        </div>

        <div class="kits-grid" id="grid"></div>

        <div class="compare-panel" id="comparePanel" style="display: none;">
            <h2>Compare Kits</h2>
            <div class="compare-items" id="compareItems"></div>
        </div>
    </main>

    <footer>
        <p>🏏 Crickit Kit Arena - Fan-made cricket equipment showcase. Prices & links are for reference only. © 2026</p>
    </footer>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Kit Details</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="modal-image" id="modalImage">🏏</div>
                <h2 class="modal-title" id="modalTitle"></h2>
                <p class="modal-meta" id="modalMeta"></p>
                <p class="modal-price" id="modalPrice"></p>
                <div class="modal-highlights" id="modalHighlights"></div>
                <div class="modal-actions">
                    <a id="modalBuy" target="_blank">Buy Now →</a>
                    <a id="modalProduct" target="_blank">View Product</a>
                    <button id="modalCompare">📊 Compare</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const KITS = [
            { id: 1, brand: "SG", name: "Aeroknox Pro Strike", price: 3499, level: "Starter", material: "Kashmir Willow", weight: "2.09 kg", icon: "🏏", highlights: ["Balanced pickup", "Wide sweet spot", "Tour grip", "Player-friendly"], buyUrl: "https://www.google.com/search?q=SG+Aeroknox+Pro+Strike", productUrl: "https://www.google.com/search?q=SG+cricket" },
            { id: 2, brand: "Kookaburra", name: "Kahuna Elite Flux", price: 17499, level: "Elite", material: "English Willow", weight: "2.09 kg", icon: "🏏", highlights: ["High spine", "Impact foam", "Premium finish", "Tour-ready"], buyUrl: "https://www.google.com/search?q=Kookaburra+Kahuna", productUrl: "https://www.google.com/search?q=Kookaburra+cricket" },
            { id: 3, brand: "SS", name: "Tonner Signature Reserve", price: 129999, level: "Pro", material: "Grade 1 English Willow", weight: "2.06 kg", icon: "🏏", highlights: ["Light pickup", "Traditional profile", "Pro padding", "Collector grade"], buyUrl: "https://www.google.com/search?q=SS+Tonner+cricket", productUrl: "https://www.google.com/search?q=SS+cricket+bat" },
            { id: 4, brand: "MRF", name: "Vault Match Day Rush", price: 2499, level: "Entry", material: "Poplar Blend", weight: "2.18 kg", icon: "🏏", highlights: ["Budget friendly", "Comfort grip", "Balanced face", "Weekend-ready"], buyUrl: "https://www.google.com/search?q=MRF+Vault+cricket", productUrl: "https://www.google.com/search?q=MRF+cricket" },
            { id: 5, brand: "Gray-Nicolls", name: "Ventus Signature Crown", price: 89999, level: "Pro", material: "Premium English Willow", weight: "2.07 kg", icon: "🏏", highlights: ["Explosive pickup", "Crisp edges", "Tour feel", "Luxury grade"], buyUrl: "https://www.google.com/search?q=Gray+Nicolls+cricket", productUrl: "https://www.google.com/search?q=Gray+Nicolls+bat" },
            { id: 6, brand: "TON", name: "Roya Limited Heritage", price: 320000, level: "Collector", material: "Hand Selected English Willow", weight: "2.05 kg", icon: "🏏", highlights: ["Large sweet spot", "Fast swing", "Leather toe guard", "Museum-piece"], buyUrl: "https://www.google.com/search?q=TON+Roya+cricket", productUrl: "https://www.google.com/search?q=TON+cricket+bat" },
            { id: 7, brand: "DSC", name: "Intense Training Edge", price: 6999, level: "Starter", material: "Hardwood Composite", weight: "2.18 kg", icon: "🏏", highlights: ["Practice ready", "Forgiving profile", "All weather", "Training focused"], buyUrl: "https://www.google.com/search?q=DSC+cricket+bat", productUrl: "https://www.google.com/search?q=DSC+cricket" },
            { id: 8, brand: "New Balance", name: "Chase Pro Gear Apex", price: 24999, level: "Elite", material: "Grade 1 English Willow", weight: "2.06 kg", icon: "🏏", highlights: ["Sharp pickup", "Modern cut", "Pro-ready", "Performance tuned"], buyUrl: "https://www.google.com/search?q=New+Balance+cricket+bat", productUrl: "https://www.google.com/search?q=New+Balance+cricket" },
            { id: 9, brand: "Adidas", name: "Velocity Prime Kit", price: 5799, level: "Club", material: "Hybrid Willow", weight: "2.12 kg", icon: "🏏", highlights: ["Quick pickup", "Street-sport look", "Modern balance", "Club friendly"], buyUrl: "https://www.google.com/search?q=Adidas+cricket+bat", productUrl: "https://www.google.com/search?q=Adidas+cricket" },
            { id: 10, brand: "Puma", name: "Supreme Match Vault", price: 149999, level: "Pro", material: "Reserve English Willow", weight: "2.04 kg", icon: "🏏", highlights: ["Reserve grade", "Elite finish", "Match-day power", "Luxury packaging"], buyUrl: "https://www.google.com/search?q=Puma+cricket+bat", productUrl: "https://www.google.com/search?q=Puma+cricket" }
        ];

        let theme = localStorage.getItem("theme") || "light";
        let compare = JSON.parse(localStorage.getItem("compare")) || [];
        let search = "";
        let brandFilter = "All";

        const brands = ["All", ...new Set(KITS.map(k => k.brand))];

        function init() {
            document.body.setAttribute("data-theme", theme);
            updateThemeBtn();
            renderBrands();
            renderGrid();
            attachEvents();
        }

        function attachEvents() {
            document.getElementById("themeBtn").addEventListener("click", toggleTheme);
            document.getElementById("search").addEventListener("input", e => {
                search = e.target.value.toLowerCase();
                renderGrid();
            });
            document.getElementById("brands").addEventListener("click", e => {
                if (e.target.classList.contains("brand-btn")) {
                    brandFilter = e.target.dataset.brand;
                    renderBrands();
                    renderGrid();
                }
            });
            document.querySelector(".modal-close").addEventListener("click", closeModal);
            document.querySelector(".modal").addEventListener("click", e => {
                if (e.target === e.currentTarget) closeModal();
            });
        }

        function toggleTheme() {
            theme = theme === "light" ? "dark" : "light";
            localStorage.setItem("theme", theme);
            document.body.setAttribute("data-theme", theme);
            updateThemeBtn();
        }

        function updateThemeBtn() {
            document.getElementById("themeBtn").textContent = theme === "light" ? "🌙" : "☀️";
        }

        function renderBrands() {
            const html = brands.map(b => `
                <button class="brand-btn ${b === brandFilter ? "active" : ""}" data-brand="${b}">
                    ${b}
                </button>
            `).join("");
            document.getElementById("brands").innerHTML = html;
        }

        function renderGrid() {
            const filtered = KITS.filter(kit => {
                const brandMatch = brandFilter === "All" || kit.brand === brandFilter;
                const searchMatch = !search || kit.name.toLowerCase().includes(search) || kit.brand.toLowerCase().includes(search);
                return brandMatch && searchMatch;
            });

            if (filtered.length === 0) {
                document.getElementById("grid").innerHTML = '<div class="empty-message">No kits found. Try a different search or filter.</div>';
                return;
            }

            const html = filtered.map(kit => `
                <div class="kit-card" onclick="showModal(${kit.id})">
                    <div class="kit-image">${kit.icon}</div>
                    <div class="kit-content">
                        <div class="kit-brand">${kit.brand}</div>
                        <div class="kit-name">${kit.name}</div>
                        <div class="kit-meta">${kit.material} • ${kit.weight}</div>
                        <div class="kit-price">₹${kit.price.toLocaleString('en-IN')}</div>
                        <div class="kit-footer">
                            <button class="btn" onclick="event.stopPropagation(); toggleCompare(${kit.id})" ${compare.includes(kit.id) ? 'style="background: var(--accent); color: white"' : ''}>
                                ${compare.includes(kit.id) ? "✓ Added" : "Compare"}
                            </button>
                            <button class="btn btn-primary" onclick="event.stopPropagation(); window.open('${kit.buyUrl}', '_blank')">Buy</button>
                        </div>
                    </div>
                </div>
            `).join("");

            document.getElementById("grid").innerHTML = html;
        }

        function toggleCompare(id) {
            if (compare.includes(id)) {
                compare = compare.filter(x => x !== id);
            } else {
                compare.push(id);
            }
            localStorage.setItem("compare", JSON.stringify(compare));
            renderGrid();
            renderCompare();
        }

        function renderCompare() {
            if (compare.length === 0) {
                document.getElementById("comparePanel").style.display = "none";
                return;
            }

            document.getElementById("comparePanel").style.display = "block";

            const items = KITS.filter(k => compare.includes(k.id));
            const html = items.map(kit => `
                <div class="compare-item">
                    <button class="compare-remove" onclick="toggleCompare(${kit.id})">×</button>
                    <h4>${kit.name}</h4>
                    <p><strong>₹${kit.price.toLocaleString('en-IN')}</strong></p>
                    <p>${kit.brand}</p>
                    <p>${kit.level} • ${kit.material}</p>
                </div>
            `).join("");

            document.getElementById("compareItems").innerHTML = html;
        }

        function showModal(id) {
            const kit = KITS.find(k => k.id === id);
            document.getElementById("modalImage").textContent = kit.icon;
            document.getElementById("modalTitle").textContent = kit.name;
            document.getElementById("modalMeta").textContent = `${kit.brand} • ${kit.level} • ${kit.material} • ${kit.weight}`;
            document.getElementById("modalPrice").textContent = `₹${kit.price.toLocaleString('en-IN')}`;
            document.getElementById("modalHighlights").innerHTML = kit.highlights.map(h => `<div class="highlight-item">✓ ${h}</div>`).join("");
            document.getElementById("modalBuy").href = kit.buyUrl;
            document.getElementById("modalProduct").href = kit.productUrl;
            document.getElementById("modalCompare").onclick = () => {
                toggleCompare(id);
                closeModal();
            };
            document.getElementById("modal").classList.add("active");
        }

        function closeModal() {
            document.getElementById("modal").classList.remove("active");
        }

        init();
        renderCompare();
    </script>
</body>
</html>
